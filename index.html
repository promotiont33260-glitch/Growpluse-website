<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grow Pulse | Dominate Solana</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
<style>
/* Base styles */
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Roboto', sans-serif; }
body { background: #0d0d0d; color: #fff; line-height: 1.6; }
a { text-decoration: none; color: inherit; }

/* Hero section with background image */
.hero {
    background: url('images/background.jpg') no-repeat center center;
    background-size: cover;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 2rem;
    position: relative;
}

.hero::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); /* overlay for text readability */
    z-index: 1;
}

.hero * {
    position: relative;
    z-index: 2;
}

.hero h1 {
    font-size: 3rem;
    color: #0f0;
    text-shadow: 0 0 10px #0f0, 0 0 20px #0f0;
    margin-bottom: 1rem;
}

.hero p {
    font-size: 1.2rem;
    margin-bottom: 2rem;
    color: #ccc;
    text-shadow: 0 0 5px #000;
}

.cta-buttons a {
    display: inline-block;
    margin: 0 1rem;
    padding: 0.8rem 2rem;
    font-weight: bold;
    border-radius: 8px;
    transition: 0.3s;
}

.cta-buttons a.telegram { background: #0088cc; color: #fff; }
.cta-buttons a.telegram:hover { background: #00bfff; }
.cta-buttons a.x { background: #1da1f2; color: #fff; }
.cta-buttons a.x:hover { background: #0d95e8; }

/* Section styles */
section { padding: 5rem 0; }
section h2 { font-size: 2rem; margin-bottom: 2rem; color: #0f0; text-align: center; }
section p { max-width: 800px; margin: 0 auto 2rem auto; text-align: center; color: #ccc; }

/* Cards for About Section */
.cards { display: flex; flex-wrap: wrap; justify-content: center; gap: 2rem; }
.card {
    background: #111; padding: 2rem; border-radius: 12px;
    width: 250px; text-align: center; transition: transform 0.3s, box-shadow 0.3s;
}
.card:hover { transform: translateY(-10px); box-shadow: 0 10px 30px rgba(0,255,0,0.5); }
.card h3 { color: #0f0; margin-bottom: 1rem; }

/* Roadmap Section */
.roadmap { display: flex; flex-direction: column; gap: 2rem; max-width: 900px; margin: 0 auto; }
.roadmap .phase {
    background: #111; padding: 1.5rem; border-left: 5px solid #0f0; border-radius: 8px;
}
.roadmap .phase h4 { color: #0f0; margin-bottom: 0.5rem; }
.roadmap .phase p { color: #ccc; }

/* Token Section */
.token { text-align: center; padding: 3rem 2rem; background: #111; border-radius: 12px; }
.token h3 { color: #0f0; margin-bottom: 1rem; }
.token p { color: #ccc; margin-bottom: 1rem; }

/* Footer CTA */
.footer { background: #000; text-align: center; padding: 3rem 1rem; }
.footer h2 { color: #0f0; margin-bottom: 2rem; }
.footer a { display: inline-block; margin: 0 1rem; padding: 1rem 2rem; border-radius: 8px; font-weight: bold; color: #fff; background: #0088cc; transition: 0.3s; }
.footer a:hover { background: #00bfff; }

/* Responsive */
@media (max-width: 768px) {
    .cards { flex-direction: column; align-items: center; }
}
</style>
</head>
<body>

<!-- Hero Section -->
<section class="hero">
    <h1>Join the Pulse. Dominate Solana.</h1>
    <p>Elite marketers, memelords, and grinders assembling the ultimate campaign army. Your ticket to the $GROWPULSE launch starts here.</p>
    <div class="cta-buttons">
        <a href="https://t.me/+jcAFFF0EBHBjZGIx" class="telegram" target="_blank">Join Telegram</a>
        <a href="https://x.com/growpulse_org" class="x" target="_blank">Follow X</a>
    </div>
</section>
